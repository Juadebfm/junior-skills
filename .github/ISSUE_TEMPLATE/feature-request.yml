name: Feature request
description: Suggest an improvement, new skill, or a better workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please focus on the real user need, not just the implementation detail.
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What is hard, missing, or confusing today?
      placeholder: I want to use the skills pack for...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: What would you like to see added or improved?
      placeholder: It would help if the repo included...
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Who is this for?
      description: Tell us who benefits from this change.
      placeholder: Beginner frontend developers, solo builders, bootcamp students...
    validations:
      required: false
  - type: textarea
    id: examples
    attributes:
      label: Example use case
      description: Share a concrete example prompt, workflow, or scenario.
      placeholder: A user could say...
    validations:
      required: false
